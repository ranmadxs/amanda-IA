<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>AiA</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
    <style>
        body {
            background: #f4f6fa;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #222;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 480px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(60,80,120,0.08);
            padding: 32px 24px 24px 24px;
        }
        h1 {
            text-align: center;
            color: #3a7bd5;
            margin-bottom: 24px;
            font-size: 2.2rem;
            letter-spacing: 2px;
        }
        .chat-type {
            margin-bottom: 18px;
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .chat-type label {
            color: #3a7bd5;
            font-weight: 500;
        }
        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #b0b8c1;
            border-radius: 6px;
            font-size: 1rem;
        }
        button {
            background: #3a7bd5;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 18px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #285a99;
        }
        .response-box {
            background: #f0f4fa;
            border: 1px solid #b0b8c1;
            border-radius: 6px;
            min-height: 120px;
            max-height: 220px;
            overflow-y: auto;
            padding: 12px;
            font-size: 1rem;
            color: #222;
        }
    </style>
</head>
<body>
    <div class='container'>
        <h1>AiA</h1>
        <form id='chat-form' onsubmit='return false;'>
            <div class='chat-type'>
                <label><input type='radio' name='type' value='chat' checked> Chat</label>
                <label><input type='radio' name='type' value='cmd'> Cmd</label>
                <label><input type='radio' name='type' value='wh40k'> WH40K</label>
            </div>
            <div class='input-row'>
                <input type='text' id='user-input' placeholder='Escribe tu mensaje...' autocomplete='off' required />
                <button type='submit'>Enviar</button>
            </div>
        </form>
        <div style='display: flex; justify-content: flex-end; margin-bottom: 4px;'>
            <button id='clear-history' title='Borrar historial' style='background: none; border: none; font-size: 1.3rem; cursor: pointer; padding: 2px 6px;'>🧹</button>
        </div>
        <div class='response-box' id='response-box'></div>
    </div>
    <script>
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');
        const responseBox = document.getElementById('response-box');

        // Cargar historial desde localStorage
        function loadHistory() {
            const history = localStorage.getItem('aia_chat_history');
            if (history) {
                responseBox.innerHTML = history;
                responseBox.scrollTop = responseBox.scrollHeight;
            }
        }
        // Guardar historial en localStorage
        function saveHistory() {
            localStorage.setItem('aia_chat_history', responseBox.innerHTML);
        }

        loadHistory();

        form.onsubmit = async (event) => {
            event.preventDefault(); // Prevenir submit tradicional
            const type = form.elements['type'].value;
            const message = input.value.trim();
            if (!message) return;
            responseBox.innerHTML += `<div style='color:#3a7bd5'><b>Tú:</b> ${message}</div>`;
            saveHistory();
            input.value = '';
            responseBox.scrollTop = responseBox.scrollHeight;
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, type })
                });
                const data = await res.json();
                responseBox.innerHTML += `<div style='margin-top:8px'><b>AiA:</b> ${data.response}</div>`;
                saveHistory();
                responseBox.scrollTop = responseBox.scrollHeight;
            } catch (e) {
                responseBox.innerHTML += `<div style='color:red'>Error: ${e}</div>`;
                saveHistory();
            }
        };

        // Botón para limpiar historial
        document.getElementById('clear-history').onclick = () => {
            localStorage.removeItem('aia_chat_history');
            responseBox.innerHTML = '';
        };
    </script>
</body>
</html>
