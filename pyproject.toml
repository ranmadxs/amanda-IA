[tool.poetry]
name = "amanda-ia"
version = "0.1.1"
description = ""
authors = ["Edgar Sánchez <edgar.sanchez@mercadolibre.cl>"]
packages = [{include = "amanda_ia"}]

[tool.poetry.dependencies]
python = "^3.11"
coverage = "^7.5.4"
tensorflow = "2.16.2"
torch = "2.2.2"
accelerate = "^0.31.0"
datasets = "^2.18.0"
tf-keras = "2.16.0"
pytesseract = "^0.3.10"
transformers = "^4.38.2"
scikit-learn = "^1.5.2"
aia_utils = "^0.3.5"
fastapi = "^0.111.0"
uvicorn = {extras = ["standard"], version = "^0.30.1"}
sentencepiece = "^0.2.0"
protobuf = ">=3.20.3,<4.21.0"

[tool.poetry.dev-dependencies]
pytest = "^8.2.2"
pytest-dotenv = "^0.5.2"
pytest-cov = "^5.0.0"

[tool.poetry.scripts]
daemon = 'amanda_ia.daemon:run'

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
