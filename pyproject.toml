[tool.poetry]
name = "amanda-ia"
version = "0.3.0"
description = "Amanda-IA Chat API"
authors = ["Your Name <your.email@example.com>"]
readme = "README.md"
packages = [{include = "amanda_ia"}]

[tool.poetry.dependencies]
python = ">=3.11,<4.0"
coverage = "^7.5.4"
tensorflow = "2.16.2"
torch = "2.2.2"
accelerate = "^0.31.0"
datasets = "^2.18.0"
tf-keras = "2.16.0"
pytesseract = "^0.3.10"
transformers = "^4.38.2"
scikit-learn = "^1.5.2"
aia-utils = "0.4.5"
fastapi = "^0.110.0"
uvicorn = "^0.27.1"
sentencepiece = "^0.2.0"
protobuf = ">=3.20.3,<4.21.0"
requests = "^2.31.0"
beautifulsoup4 = "^4.12.3"
python-dotenv = "^1.0.1"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
pytest-cov = "^5.0.0"
pytest-dotenv = "^0.5.2"

[tool.poetry.scripts]
daemon = 'amanda_ia.daemon:run'

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v"
norecursedirs = ["tests/olds", "tests/__pycache__", ".git", "build", "dist"]
