<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>amanda-IA</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root {
  --accent:     #7f8c8d;
  --accent-dim: #2c3e50;
  --bg:         #0d0d1a;
  --bg-panel:   #111120;
  --bg-msg-ai:  #111120;
  --text:       #dde1f0;
  --text-dim:   #5a6070;
  --border:     #1e2035;
  --input-bg:   #181828;
  --radius:     10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Mode tabs ─────────────────────────────────────────── */
#header {
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
#header::-webkit-scrollbar { display: none; }

.mode-tab {
  padding: 0.55rem 1.1rem;
  cursor: pointer;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color .15s, border-color .15s;
  user-select: none;
}
.mode-tab:hover { color: var(--text); }
.mode-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 700;
}

/* ── Banner ─────────────────────────────────────────────── */
#banner {
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  padding: 0.45rem 1.4rem 0.35rem;
  flex-shrink: 0;
  display: flex;
  align-items: baseline;
  gap: 1.2rem;
}
#banner pre {
  color: var(--accent);
  font-size: 0.58rem;
  line-height: 1.25;
  opacity: 0.9;
  transition: color .3s;
}
#banner-subtitle {
  font-size: 0.68rem;
  color: var(--text-dim);
  letter-spacing: 0.06em;
}
#banner-info {
  font-size: 0.62rem;
  color: var(--text-dim);
  opacity: 0.7;
  margin-top: 0.2rem;
  letter-spacing: 0.04em;
}

/* LIVE badge en el banner */
#live-badge {
  display: none;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.68rem;
  font-weight: 700;
  color: #e74c3c;
  margin-left: auto;
}
#live-badge.visible { display: flex; }
#live-dot {
  width: 7px; height: 7px;
  background: #e74c3c;
  border-radius: 50%;
  animation: pulse 1.2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(0.7); }
}

/* ── Messages ───────────────────────────────────────────── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.2rem 1rem 0.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg {
  display: flex;
  flex-direction: column;
  max-width: 78%;
  gap: 0.2rem;
}
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.ai   { align-self: flex-start; align-items: flex-start; }

.msg-label {
  font-size: 0.62rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 0 0.3rem;
}
.msg.user .msg-label { color: var(--accent); }

.msg-bubble {
  padding: 0.55rem 0.85rem;
  border-radius: var(--radius);
  font-size: 0.86rem;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
  transition: background .3s, border-color .3s;
}
.msg.user .msg-bubble {
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  border-bottom-right-radius: 3px;
}
.msg.ai .msg-bubble {
  background: var(--bg-msg-ai);
  border: 1px solid var(--border);
  border-bottom-left-radius: 3px;
}

/* Live feed bubble */
.msg.live .msg-label { color: #e74c3c; }
.msg.live .msg-bubble {
  background: #150d0d;
  border-color: #3d1515;
  font-size: 0.82rem;
  line-height: 1.7;
  min-width: 300px;
}

/* system notice */
.msg-system {
  align-self: center;
  font-size: 0.7rem;
  color: var(--text-dim);
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0.2rem 0.75rem;
}

/* ── Typing dots ────────────────────────────────────────── */
.typing {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 0.55rem 0.85rem;
  background: var(--bg-msg-ai);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  border-bottom-left-radius: 3px;
}
.typing span {
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: bounce 1.1s infinite ease-in-out;
  transition: background .3s;
}
.typing span:nth-child(2) { animation-delay: .18s; }
.typing span:nth-child(3) { animation-delay: .36s; }
@keyframes bounce {
  0%, 75%, 100% { transform: translateY(0); opacity: .35; }
  38% { transform: translateY(-7px); opacity: 1; }
}

/* ── Log panel ──────────────────────────────────────────── */
.log-panel {
  margin-top: 0.5rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.7rem;
  background: #0a0a14;
  overflow: hidden;
}
.log-summary {
  cursor: pointer;
  padding: 0.3rem 0.6rem;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 0.5rem;
  user-select: none;
  list-style: none;
}
.log-summary::-webkit-details-marker { display: none; }
.log-summary:hover { color: var(--text); }
.log-toggle { font-size: 0.6rem; transition: transform .2s; }
details[open] .log-toggle { transform: rotate(90deg); }
.log-count { color: var(--accent); font-weight: 600; }
.log-servers { opacity: .6; }
.log-body {
  padding: 0.4rem 0.6rem 0.6rem;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}
.log-entry {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.68rem;
  padding: 0.2rem 0.4rem;
  border-radius: 4px;
  line-height: 1.4;
  white-space: pre-wrap;
  word-break: break-all;
}
.log-entry.log-plan   { color: #a29bfe; background: #1a1530; }
.log-entry.log-llm    { color: #74b9ff; background: #0d1a2a; }
.log-entry.log-mcp    { color: #55efc4; background: #0a1f18; }
.log-entry.log-result { color: #ffeaa7; background: #1a1500; font-size: 0.78rem; opacity: 0.85; }
.log-entry.log-other  { color: var(--text-dim); }
.log-mermaid {
  background: #0a0a14;
  padding: 0.4rem;
  border-radius: 4px;
  overflow-x: auto;
}
.log-mermaid svg { max-width: 100%; height: auto; }

/* ── Input area ─────────────────────────────────────────── */
#input-wrap {
  position: relative;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  padding: 0.7rem 1rem;
  display: flex;
  gap: 0.5rem;
  align-items: flex-end;
  flex-shrink: 0;
}

#chat-input {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.55rem 0.85rem;
  color: var(--text);
  font-family: inherit;
  font-size: 0.86rem;
  resize: none;
  min-height: 40px;
  max-height: 120px;
  outline: none;
  transition: border-color .15s;
  overflow-y: auto;
}
#chat-input:focus { border-color: var(--accent); }
#chat-input::placeholder { color: var(--text-dim); }

#send-btn {
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  padding: 0 1.1rem;
  height: 40px;
  color: #fff;
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: opacity .15s, background .3s;
  white-space: nowrap;
  flex-shrink: 0;
}
#send-btn:hover:not(:disabled) { opacity: 0.85; }
#send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* live mode: send button becomes STOP */
body.live-mode #send-btn {
  background: #c0392b;
}
body.live-mode #chat-input {
  border-color: #3d1515;
  background: #110909;
}

/* ── Slash command autocomplete ─────────────────────────── */
#slash-menu {
  position: absolute;
  bottom: calc(100% - 0.7rem);
  left: 1rem;
  right: calc(1rem + 90px);
  background: var(--bg-panel);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  overflow: hidden;
  display: none;
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
  max-height: 260px;
  overflow-y: auto;
}
#slash-menu.visible { display: block; }

.slash-item {
  display: flex;
  align-items: baseline;
  gap: 0.8rem;
  padding: 0.45rem 0.85rem;
  cursor: pointer;
  transition: background .1s;
  border-bottom: 1px solid var(--border);
}
.slash-item:last-child { border-bottom: none; }
.slash-item:hover,
.slash-item.focused { background: var(--accent-dim); }
.slash-cmd {
  color: var(--accent);
  font-size: 0.83rem;
  font-weight: 700;
  white-space: nowrap;
  min-width: 120px;
}
.slash-cmd.watch-cmd { color: #e74c3c; }
.slash-desc {
  color: var(--text-dim);
  font-size: 0.75rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Mode flash ─────────────────────────────────────────── */
body.mode-flash #banner { animation: flash .35s ease; }
@keyframes flash { 0% { opacity: 0.4; } 100% { opacity: 1; } }

/* ── Resume modal ────────────────────────────────────────── */
#resume-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#resume-overlay.visible { display: flex; }
#resume-modal {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: min(480px, 92vw);
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#resume-modal h2 {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--accent);
  padding: 0.8rem 1rem;
  border-bottom: 1px solid var(--border);
  margin: 0;
}
#resume-list {
  overflow-y: auto;
  flex: 1;
}
.resume-item {
  padding: 0.65rem 1rem;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.resume-item:hover { background: #1a1a2e; }
.resume-title { font-size: 0.85rem; color: var(--text); }
.resume-meta  { font-size: 0.72rem; color: var(--text-dim); margin-top: 0.15rem; }
#resume-empty { padding: 1.2rem; color: var(--text-dim); font-size: 0.85rem; text-align: center; }
#resume-close {
  padding: 0.6rem 1rem;
  font-size: 0.8rem;
  color: var(--text-dim);
  cursor: pointer;
  text-align: center;
  border-top: 1px solid var(--border);
}
#resume-close:hover { color: var(--text); }

/* ── Plan popup ─────────────────────────────────────────── */
#plan-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#plan-overlay.visible { display: flex; }
#plan-modal {
  background: #0e0e1a;
  border: 1px solid #a29bfe44;
  border-radius: var(--radius);
  width: min(640px, 94vw);
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7);
}
#plan-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.7rem 1rem;
  border-bottom: 1px solid #a29bfe33;
  font-size: 0.8rem;
  color: #a29bfe;
  font-weight: 600;
}
#plan-modal-body {
  overflow-y: auto;
  flex: 1;
  padding: 1rem;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.8rem;
  color: #cdc8ff;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.6;
}
#plan-modal-close {
  cursor: pointer;
  color: var(--text-dim);
  font-size: 1rem;
  line-height: 1;
  padding: 0.2rem 0.4rem;
  border-radius: 4px;
}
#plan-modal-close:hover { color: white; background: #ffffff22; }
.log-entry.log-plan {
  display: flex;
  align-items: flex-start;
  gap: 0.4rem;
}
.log-zoom-btn {
  flex-shrink: 0;
  cursor: pointer;
  font-size: 0.75rem;
  color: #a29bfe99;
  line-height: 1;
  margin-top: 0.05rem;
  user-select: none;
}
.log-zoom-btn:hover { color: #a29bfe; }
.log-plan-text { flex: 1; }

/* ── IDE layout (modo_dev) ───────────────────────────────── */
body.ide-mode {
  flex-direction: row;
  overflow: hidden;
}
body.ide-mode #banner { display: none; }

/* Activity bar */
#ide-activity {
  display: none;
  width: 48px;
  background: #333333;
  flex-direction: column;
  align-items: center;
  padding-top: 8px;
  gap: 4px;
  flex-shrink: 0;
  border-right: 1px solid #252526;
}
body.ide-mode #ide-activity { display: flex; }

.ide-act-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px;
  cursor: pointer;
  color: #858585;
  font-size: 18px;
  transition: color .15s, background .15s;
  user-select: none;
}
.ide-act-btn:hover { color: #cccccc; background: #2a2d2e; }
.ide-act-btn.active { color: #ffffff; border-left: 2px solid #ffffff; border-radius: 0; }
#btn-mongo.active { border-left-color: #00ed64; color: #00ed64; }
.ide-act-btn.mcp-disabled {
  opacity: 0.35;
  cursor: not-allowed;
  position: relative;
}
.ide-act-btn.mcp-disabled::after {
  content: '🔒';
  font-size: 0.55rem;
  position: absolute;
  bottom: 4px;
  right: 4px;
  line-height: 1;
}

/* MongoDB tree */
.mg-db   { color: #00ed64; font-weight: 600; }
.mg-col  { color: #cccccc; }
.mg-col:hover { background: #094771; color: #fff; }
.mg-count { color: #555; font-size: 0.68rem; margin-left: auto; padding-right: 8px; }
.mg-loading { color: #555; padding: 8px 14px; font-size: 0.78rem; }
.mg-err { color: #e74c3c; padding: 8px 14px; font-size: 0.78rem; }

/* Sidebar file tree */
#ide-sidebar {
  display: none;
  width: 220px;
  min-width: 140px;
  max-width: 380px;
  background: #252526;
  flex-direction: column;
  border-right: 1px solid #3c3c3c;
  overflow: hidden;
  flex-shrink: 0;
  resize: horizontal;
}
body.ide-mode #ide-sidebar { display: flex; }
#ide-sidebar-title {
  padding: 8px 12px 6px;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: #bbbbbb;
  text-transform: uppercase;
  flex-shrink: 0;
  border-bottom: 1px solid #3c3c3c;
}
#file-tree {
  overflow-y: auto;
  flex: 1;
  font-size: 0.78rem;
}
#file-tree::-webkit-scrollbar { width: 6px; }
#file-tree::-webkit-scrollbar-thumb { background: #424242; border-radius: 3px; }

.ft-item {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 0;
  padding-left: calc(var(--depth,0) * 14px + 8px);
  cursor: pointer;
  color: #cccccc;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background .1s;
  user-select: none;
}
.ft-item:hover  { background: #2a2d2e; }
.ft-item.active { background: #094771; color: #fff; }
.ft-arrow { font-size: 10px; width: 12px; flex-shrink: 0; color: #858585; }
.ft-icon  { flex-shrink: 0; }
.ft-name  { overflow: hidden; text-overflow: ellipsis; }

/* Editor panel */
#ide-editor {
  display: none;
  flex: 1;
  flex-direction: column;
  background: #1e1e1e;
  overflow: hidden;
  min-width: 0;
}
body.ide-mode #ide-editor { display: flex; }

#editor-tabs {
  display: flex;
  background: #2d2d2d;
  border-bottom: 1px solid #252526;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
#editor-tabs::-webkit-scrollbar { display: none; }

.editor-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  font-size: 0.75rem;
  color: #969696;
  cursor: pointer;
  white-space: nowrap;
  border-right: 1px solid #252526;
  transition: background .1s;
}
.editor-tab:hover { background: #1e1e1e; }
.editor-tab.active { background: #1e1e1e; color: #cccccc; border-top: 1px solid #0078d4; }
.editor-tab-close {
  font-size: 10px; color: #858585; margin-left: 2px;
  padding: 0 2px; border-radius: 2px;
}
.editor-tab-close:hover { background: #555; color: #fff; }

#editor-body {
  flex: 1;
  overflow: auto;
  position: relative;
}
#editor-body::-webkit-scrollbar { width: 10px; height: 10px; }
#editor-body::-webkit-scrollbar-thumb { background: #424242; }
#editor-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #555;
  font-size: 0.85rem;
  flex-direction: column;
  gap: 8px;
}
#editor-code-wrap {
  display: flex;
  min-height: 100%;
}
#editor-gutter {
  width: 50px;
  background: #1e1e1e;
  color: #5a5a5a;
  font-size: 0.73rem;
  line-height: 1.5;
  padding: 12px 8px 12px 0;
  text-align: right;
  flex-shrink: 0;
  user-select: none;
  border-right: 1px solid #2d2d2d;
}
#editor-code {
  flex: 1;
  padding: 12px 16px;
  font-size: 0.73rem;
  line-height: 1.5;
  white-space: pre;
  color: #d4d4d4;
  overflow: visible;
  tab-size: 2;
}

/* Chat panel in IDE mode */
#chat-panel {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
  min-width: 0;
}
body.ide-mode #chat-panel {
  width: 380px;
  min-width: 260px;
  max-width: 500px;
  flex: none;
  border-left: 1px solid #3c3c3c;
}
</style>
</head>
<body>

<!-- Plan popup -->
<div id="plan-overlay" onclick="if(event.target===this)closePlanPopup()">
  <div id="plan-modal">
    <div id="plan-modal-header">
      <span>Plan</span>
      <span id="plan-modal-close" onclick="closePlanPopup()">✕</span>
    </div>
    <div id="plan-modal-body"></div>
  </div>
</div>

<!-- Resume modal -->
<div id="resume-overlay">
  <div id="resume-modal">
    <h2>📋 Conversaciones anteriores</h2>
    <div id="resume-list"></div>
    <div id="resume-close">Cancelar</div>
  </div>
</div>

<!-- IDE: Activity bar -->
<div id="ide-activity">
  <div class="ide-act-btn active" id="btn-explorer" title="Explorer" onclick="ideSwitchPanel('explorer')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/>
    </svg>
  </div>
  <div class="ide-act-btn" id="btn-mongo" title="MongoDB" onclick="ideSwitchPanel('mongo')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <ellipse cx="12" cy="6" rx="7" ry="3"/>
      <path d="M5 6v6c0 1.66 3.13 3 7 3s7-1.34 7-3V6"/>
      <path d="M5 12v6c0 1.66 3.13 3 7 3s7-1.34 7-3v-6"/>
    </svg>
  </div>
</div>

<!-- IDE: Sidebar (panels intercambiables) -->
<div id="ide-sidebar">
  <div id="ide-sidebar-title">Explorer</div>
  <!-- Panel: File tree -->
  <div id="panel-explorer">
    <div id="file-tree"></div>
  </div>
  <!-- Panel: MongoDB -->
  <div id="panel-mongo" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
    <div id="mongo-tree" style="overflow-y:auto;flex:1;font-size:0.78rem;"></div>
  </div>
</div>

<!-- IDE: Editor -->
<div id="ide-editor">
  <div id="editor-tabs"></div>
  <div id="editor-body">
    <div id="editor-empty">
      <span style="font-size:2rem">📄</span>
      <span>Selecciona un archivo</span>
    </div>
    <div id="editor-code-wrap" style="display:none">
      <div id="editor-gutter"></div>
      <pre id="editor-code"></pre>
    </div>
  </div>
</div>

<!-- Chat panel (siempre visible, derecha en IDE mode) -->
<div id="chat-panel">
  <div id="header"></div>

  <div id="banner">
    <pre id="banner-text"></pre>
    <span id="banner-subtitle"></span>
    <div id="banner-info"></div>
    <span id="live-badge"><span id="live-dot"></span>EN VIVO · /watch para detener</span>
  </div>

  <div id="messages"></div>

  <div id="input-wrap">
    <div id="slash-menu"></div>
    <textarea id="chat-input" rows="1" placeholder="Escribe un mensaje... (/ para comandos)"></textarea>
    <button id="send-btn">Enviar ↵</button>
  </div>
</div>

<script>
// ── State ───────────────────────────────────────────────────────
let mods        = [];
let currentMod  = null;
let busy        = false;
let webCommands = [];
let slashFocusIdx = -1;
let liveSource  = null;   // EventSource activo (monitor)
let liveBubble  = null;   // elemento del DOM con el feed live

// ── DOM ─────────────────────────────────────────────────────────
const header     = document.getElementById('header');
const bannerEl   = document.getElementById('banner-text');
const subtitleEl = document.getElementById('banner-subtitle');
const bannerInfo = document.getElementById('banner-info');
const liveBadge  = document.getElementById('live-badge');
const messages   = document.getElementById('messages');
const input      = document.getElementById('chat-input');
const sendBtn    = document.getElementById('send-btn');
const slashMenu  = document.getElementById('slash-menu');

// ── Boot ─────────────────────────────────────────────────────────
async function init() {
  mermaid.initialize({ startOnLoad: false, theme: 'dark' });
  try {
    const [modsRes, cmdsRes, infoRes] = await Promise.all([
      fetch('/api/mods'), fetch('/api/commands'), fetch('/api/info')
    ]);
    mods = await modsRes.json();
    webCommands = await cmdsRes.json();
    const info = await infoRes.json();
    bannerInfo.textContent = `v${info.version} · ${info.model} · ${info.cwd}`;
  } catch(e) {
    mods = [{ name:'aia', key:'', displayName:'AiA', banner:'', color:'#7f8c8d', colorDim:'#2c3e50' }];
  }
  renderTabs();
  applyMod(mods[0], false);
  input.focus();
}

// ── Tabs ─────────────────────────────────────────────────────────
function renderTabs() {
  header.innerHTML = '';
  mods.forEach(m => {
    const tab = document.createElement('div');
    tab.className = 'mode-tab';
    tab.textContent = m.displayName;
    tab.dataset.key = m.key;
    tab.addEventListener('click', () => selectMod(m));
    header.appendChild(tab);
  });
}

async function selectMod(mod) {
  if (currentMod && currentMod.key === mod.key) return;
  stopWatch();
  applyMod(mod, true);
  const res = await fetch('/api/mode', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ mode: mod.key })
  });
  const data = await res.json();
  if (data.commands) webCommands = data.commands;
  if (data.mcpStatus) applyMcpStatus(data.mcpStatus);
  messages.innerHTML = '';
  addSystemMsg(`Modo ${mod.displayName} activado`);
}

function applyMod(mod, animate) {
  currentMod = mod;
  document.documentElement.style.setProperty('--accent',     mod.color);
  document.documentElement.style.setProperty('--accent-dim', mod.colorDim);
  bannerEl.textContent = mod.banner || mod.displayName;
  const modeLabel = mod.key ? `modo ${mod.name}` : 'asistente general';
  if (mod.mcpServers && mod.mcpServers.length) {
    subtitleEl.textContent = `${modeLabel}  ·  🟢 ${mod.mcpServers.join('  🟢 ')}`;
  } else {
    subtitleEl.textContent = modeLabel;
  }
  document.title = `amanda-IA · ${mod.displayName}`;
  document.querySelectorAll('.mode-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.key === mod.key)
  );
  if (animate) {
    document.body.classList.remove('mode-flash');
    void document.body.offsetWidth;
    document.body.classList.add('mode-flash');
  }
  // IDE mode: activar/desactivar layout
  const isIde = mod.key === 'modo_dev';
  document.body.classList.toggle('ide-mode', isIde);
  if (isIde) ideInit();
}

// ── Live Monitor (/watch) ─────────────────────────────────────────
function startWatch() {
  if (liveSource) { stopWatch(); return; } // toggle

  addMsg('user', '/watch');
  addSystemMsg('Conectando al monitor en vivo…');

  liveBubble = addLiveBubble();
  document.body.classList.add('live-mode');
  liveBadge.classList.add('visible');
  sendBtn.textContent = 'Detener ■';

  liveSource = new EventSource('/api/watch');

  liveSource.addEventListener('connected', e => {
    const d = JSON.parse(e.data);
    updateLiveBubble(d.msg);
  });

  liveSource.addEventListener('reading', e => {
    const d = JSON.parse(e.data);
    updateLiveBubble(d.line);
  });

  liveSource.addEventListener('error', e => {
    let msg = 'Error de conexión con el monitor.';
    try { msg = JSON.parse(e.data).msg; } catch(_) {}
    updateLiveBubble(msg);
    stopWatch();
  });

  liveSource.onerror = () => {
    updateLiveBubble('Conexión perdida con el monitor.');
    stopWatch();
  };
}

function stopWatch() {
  if (!liveSource) return;
  liveSource.close();
  liveSource = null;
  document.body.classList.remove('live-mode');
  liveBadge.classList.remove('visible');
  sendBtn.textContent = 'Enviar ↵';
  liveBubble = null;
  addSystemMsg('Monitor detenido');
}

function addLiveBubble() {
  const wrap = document.createElement('div');
  wrap.className = 'msg live';
  wrap.id = 'live-bubble-wrap';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.innerHTML = '● EN VIVO';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.id = 'live-bubble';
  bubble.textContent = 'Iniciando…';

  wrap.appendChild(label);
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  scrollDown();
  return bubble;
}

const MAX_LIVE_LINES = 50;
let liveLines = [];

function updateLiveBubble(line) {
  if (!liveBubble) return;
  liveLines.push(line);
  if (liveLines.length > MAX_LIVE_LINES) liveLines.shift();
  liveBubble.textContent = liveLines.join('\n');
  scrollDown();
}

// ── Slash menu ───────────────────────────────────────────────────
function filteredCommands(prefix) {
  return webCommands.filter(c => c.cmd.toLowerCase().startsWith(prefix.toLowerCase()));
}

function showSlashMenu(prefix) {
  const items = filteredCommands(prefix);
  if (!items.length) { hideSlashMenu(); return; }
  slashFocusIdx = -1;
  slashMenu.innerHTML = '';
  items.forEach(c => {
    const row = document.createElement('div');
    row.className = 'slash-item';
    const isWatch = c.cmd === '/watch';
    row.innerHTML = `<span class="slash-cmd${isWatch ? ' watch-cmd' : ''}">${c.cmd}</span><span class="slash-desc">${c.desc}</span>`;
    row.addEventListener('mousedown', e => { e.preventDefault(); selectSlashItem(c.cmd); });
    slashMenu.appendChild(row);
  });
  slashMenu.classList.add('visible');
}

function hideSlashMenu() {
  slashMenu.classList.remove('visible');
  slashFocusIdx = -1;
}

function selectSlashItem(cmd) {
  if (cmd === '/watch') {
    hideSlashMenu();
    input.value = '';
    startWatch();
    return;
  }
  input.value = cmd + ' ';
  input.style.height = 'auto';
  hideSlashMenu();
  input.focus();
}

function moveFocus(dir) {
  const items = slashMenu.querySelectorAll('.slash-item');
  if (!items.length) return;
  items[slashFocusIdx]?.classList.remove('focused');
  slashFocusIdx = (slashFocusIdx + dir + items.length) % items.length;
  const focused = items[slashFocusIdx];
  focused.classList.add('focused');
  focused.scrollIntoView({ block: 'nearest' });
}

// ── Messages ─────────────────────────────────────────────────────

// Rellena un elemento .msg-bubble con texto e imágenes inline [AIA_IMG:url]
function fillBubble(el, text) {
  const IMG_RE = /\[AIA_IMG:([^\]]+)\]/g;
  let last = 0, m;
  el.innerHTML = '';
  while ((m = IMG_RE.exec(text)) !== null) {
    if (m.index > last) {
      el.appendChild(document.createTextNode(text.slice(last, m.index)));
    }
    const img = document.createElement('img');
    img.src = m[1];
    img.style.cssText = 'max-width:100%;border-radius:6px;margin-top:0.4rem;display:block';
    el.appendChild(img);
    last = m.index + m[0].length;
  }
  if (last < text.length) {
    el.appendChild(document.createTextNode(text.slice(last)));
  }
}

function addMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'tú' : (currentMod?.displayName || 'AiA');
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  fillBubble(bubble, text);
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  scrollDown();
}

// ── Log panel en vivo ─────────────────────────────────────────────
function classifyLog(entry) {
  if (entry.startsWith('PLAN>>'))   return 'log-plan';
  if (entry.startsWith('LLM>>'))    return 'log-llm';
  if (entry.startsWith('RESULT>>')) return 'log-result';
  if (entry.includes('>>mcp.'))     return 'log-mcp';
  return 'log-other';
}

function planToMermaid(planText) {
  const text = planText.replace(/^PLAN>>\s*/, '').trim();
  const parts = text.split(/\s*[-→>]+\s*/).map(s => s.trim()).filter(Boolean);
  if (parts.length < 2) return null;
  const nodes = parts.map((s, i) => `  N${i}["${s.replace(/"/g,"'")}"]`).join('\n');
  const edges = parts.slice(0,-1).map((_,i) => `  N${i} --> N${i+1}`).join('\n');
  return `flowchart LR\n${nodes}\n${edges}`;
}

// Crea el wrapper AI con panel de logs en vivo. Devuelve { wrap, appendLog, finalize }.
function createLiveAiMsg() {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = currentMod?.displayName || 'AiA';

  // Panel de logs colapsado por defecto, se actualiza en vivo
  const details = document.createElement('details');
  details.className = 'log-panel';

  const summary = document.createElement('summary');
  summary.className = 'log-summary';

  const toggleEl = document.createElement('span');
  toggleEl.className = 'log-toggle';
  toggleEl.textContent = '▶ ';

  const countEl  = document.createElement('span');
  countEl.className = 'log-count';
  countEl.textContent = '0 pasos';

  const serversEl = document.createElement('span');
  serversEl.className = 'log-servers';

  summary.appendChild(toggleEl);
  summary.appendChild(countEl);
  summary.appendChild(serversEl);

  details.addEventListener('toggle', () => {
    toggleEl.textContent = details.open ? '▼ ' : '▶ ';
  });
  details.appendChild(summary);

  const body = document.createElement('div');
  body.className = 'log-body';
  details.appendChild(body);

  // Dots de carga debajo del panel
  const dots = document.createElement('div');
  dots.className = 'typing';
  dots.innerHTML = '<span></span><span></span><span></span>';

  wrap.appendChild(label);
  wrap.appendChild(details);
  wrap.appendChild(dots);
  messages.appendChild(wrap);
  scrollDown();

  let count = 0;
  const servers = new Set();

  function _updateSummary() {
    countEl.textContent = `${count} paso${count !== 1 ? 's' : ''}`;
    if (servers.size) {
      serversEl.textContent = ' · ' + [...servers].map(s => `🔌 ${s}`).join(' ');
    }
  }

  function appendLog(entry) {
    count++;
    const cls = classifyLog(entry);

    // Rastrear servidores MCP
    if (cls === 'log-mcp') {
      const m = entry.match(/mcp\.([^.]+)\./);
      if (m) servers.add(m[1]);
    }

    if (cls === 'log-plan') {
      const mermaidDef = planToMermaid(entry);
      if (mermaidDef) {
        const mermaidEl = document.createElement('div');
        mermaidEl.className = 'log-mermaid';
        const id = 'mmd-' + Math.random().toString(36).slice(2);
        mermaid.render(id, mermaidDef).then(({ svg }) => {
          mermaidEl.innerHTML = svg;
        }).catch(() => {
          mermaidEl.textContent = entry;
          mermaidEl.className = 'log-entry log-plan';
        });
        body.appendChild(mermaidEl);
        _updateSummary();
        scrollDown();
        return;
      }
    }

    const el = document.createElement('div');
    el.className = `log-entry ${cls}`;
    if (cls === 'log-plan') {
      const zoom = document.createElement('span');
      zoom.className = 'log-zoom-btn';
      zoom.textContent = '🔍';
      zoom.title = 'Ampliar plan';
      zoom.onclick = () => showPlanPopup(entry);
      const txt = document.createElement('span');
      txt.className = 'log-plan-text';
      txt.textContent = entry;
      el.appendChild(zoom);
      el.appendChild(txt);
    } else {
      el.textContent = entry;
    }
    body.appendChild(el);
    _updateSummary();
    scrollDown();
  }

  function finalize(text) {
    dots.remove();
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    fillBubble(bubble, text);
    wrap.appendChild(bubble);
    scrollDown();
  }

  return { wrap, appendLog, finalize };
}

function addSystemMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg-system';
  el.textContent = text;
  messages.appendChild(el);
  scrollDown();
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.id = 'typing-wrap';
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = currentMod?.displayName || 'AiA';
  const dots = document.createElement('div');
  dots.className = 'typing';
  dots.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(label);
  wrap.appendChild(dots);
  messages.appendChild(wrap);
  scrollDown();
}

function removeTyping() { document.getElementById('typing-wrap')?.remove(); }
function scrollDown() { messages.scrollTop = messages.scrollHeight; }

// ── Send ─────────────────────────────────────────────────────────
async function send() {
  const text = input.value.trim();

  if (liveSource) { stopWatch(); return; }
  if (!text || busy) return;

  if (text.toLowerCase() === '/watch') {
    input.value = ''; input.style.height = 'auto';
    hideSlashMenu(); startWatch(); return;
  }

  hideSlashMenu();
  busy = true; sendBtn.disabled = true;
  input.value = ''; input.style.height = 'auto';

  addMsg('user', text);

  let liveMsg = null;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    // ── Si es JSON plano (respuesta rápida sin SSE) ──
    const ct = res.headers.get('content-type') || '';
    if (ct.includes('application/json')) {
      const data = await res.json();
      if (data.response === '__watch__')  { startWatch(); return; }
      if (data.response === '__resume__') { showResume(); return; }
      addMsg('ai', data.response || data.error || '(sin respuesta)');
      return;
    }

    // ── SSE streaming: crear panel en vivo antes del primer dato ──
    liveMsg = createLiveAiMsg();

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    const parseSSE = (chunk) => {
      buf += chunk;
      const events = [];
      let idx;
      while ((idx = buf.indexOf('\n\n')) !== -1) {
        const block = buf.slice(0, idx);
        buf = buf.slice(idx + 2);
        let type = '', data = '';
        for (const line of block.split('\n')) {
          if (line.startsWith('event: ')) type = line.slice(7).trim();
          else if (line.startsWith('data: '))  data = line.slice(6).trim();
        }
        if (type && data) events.push({ type, data: JSON.parse(data) });
      }
      return events;
    };

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const ev of parseSSE(decoder.decode(value, { stream: true }))) {
        if (ev.type === 'log') {
          liveMsg.appendLog(ev.data.entry);
        } else if (ev.type === 'response') {
          const resp = ev.data.response;
          if (resp === '__watch__') { liveMsg.wrap.remove(); startWatch(); return; }
          liveMsg.finalize(resp || '(sin respuesta)');
          return;
        }
      }
    }
    liveMsg.finalize('(sin respuesta)');

  } catch(e) {
    if (liveMsg) liveMsg.finalize('Error de conexión: ' + e.message);
    else addMsg('ai', 'Error de conexión: ' + e.message);
  } finally {
    busy = false; sendBtn.disabled = false; input.focus();
  }
}

// ── Input ────────────────────────────────────────────────────────
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  const val = input.value;
  if (val.startsWith('/') && !val.includes(' ')) {
    showSlashMenu(val);
  } else {
    hideSlashMenu();
  }
});

input.addEventListener('keydown', e => {
  if (slashMenu.classList.contains('visible')) {
    if (e.key === 'ArrowUp')   { e.preventDefault(); moveFocus(-1); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); moveFocus(1);  return; }
    if (e.key === 'Tab') {
      e.preventDefault();
      const focused = slashMenu.querySelector('.slash-item.focused')
                   || slashMenu.querySelector('.slash-item');
      if (focused) selectSlashItem(focused.querySelector('.slash-cmd').textContent);
      return;
    }
    if (e.key === 'Escape') { e.preventDefault(); hideSlashMenu(); return; }
    if (e.key === 'Enter' && !e.shiftKey) {
      const focused = slashMenu.querySelector('.slash-item.focused');
      if (focused) { e.preventDefault(); selectSlashItem(focused.querySelector('.slash-cmd').textContent); return; }
    }
  }
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  if (e.key === 'Escape') { hideSlashMenu(); if (liveSource) stopWatch(); }
});

document.addEventListener('mousedown', e => {
  if (!slashMenu.contains(e.target) && e.target !== input) hideSlashMenu();
});

sendBtn.addEventListener('click', send);

// ── IDE panel switcher ────────────────────────────────────────────
let _activePanel = 'explorer';

function ideSwitchPanel(name) {
  _activePanel = name;
  document.getElementById('panel-explorer').style.display = name === 'explorer' ? 'block' : 'none';
  const mp = document.getElementById('panel-mongo');
  mp.style.display = name === 'mongo' ? 'flex' : 'none';
  document.getElementById('ide-sidebar-title').textContent =
    name === 'explorer' ? 'Explorer' : 'MongoDB';
  document.getElementById('btn-explorer').classList.toggle('active', name === 'explorer');
  document.getElementById('btn-mongo').classList.toggle('active', name === 'mongo');
  if (name === 'mongo') mongoInit();
}

// ── MongoDB explorer ──────────────────────────────────────────────
let _mongoLoaded = false;
let _mongoExpanded = new Set();

async function mongoInit() {
  if (_mongoLoaded) return;
  const tree = document.getElementById('mongo-tree');
  tree.innerHTML = '<div class="mg-loading">⏳ Conectando a MongoDB…</div>';
  const data = await fetch('/api/mongo/dbs').then(r => r.json()).catch(() => ({ error: 'sin conexión' }));
  if (data.error) {
    tree.innerHTML = `<div class="mg-err">⚠️ ${data.error}</div>`;
    return;
  }
  _mongoLoaded = true;
  tree.innerHTML = '';
  for (const db of data.dbs) {
    const dbRow = document.createElement('div');
    dbRow.className = 'ft-item mg-db';
    dbRow.style.setProperty('--depth', 0);
    dbRow.innerHTML = `<span class="ft-arrow">▶</span><span>🗄️</span><span class="ft-name">${db}</span>`;
    tree.appendChild(dbRow);

    const colContainer = document.createElement('div');
    tree.appendChild(colContainer);

    dbRow.addEventListener('click', () => mongoToggleDb(db, dbRow, colContainer));
  }
}

async function mongoToggleDb(db, row, container) {
  const arrow = row.querySelector('.ft-arrow');
  if (_mongoExpanded.has(db)) {
    _mongoExpanded.delete(db);
    container.innerHTML = '';
    arrow.textContent = '▶';
    return;
  }
  _mongoExpanded.add(db);
  arrow.textContent = '▼';
  container.innerHTML = '<div class="mg-loading" style="padding-left:22px">⏳ cargando…</div>';

  const data = await fetch(`/api/mongo/collections?db=${encodeURIComponent(db)}`).then(r=>r.json()).catch(()=>({error:'error'}));
  container.innerHTML = '';
  if (data.error) {
    container.innerHTML = `<div class="mg-err" style="padding-left:22px">⚠️ ${data.error}</div>`;
    return;
  }
  for (const col of data.collections) {
    const row2 = document.createElement('div');
    row2.className = 'ft-item mg-col';
    row2.style.setProperty('--depth', 1);
    row2.innerHTML = `<span class="ft-arrow"></span><span>📋</span><span class="ft-name">${col.name}</span><span class="mg-count">${col.count != null ? col.count.toLocaleString() : ''}</span>`;
    row2.addEventListener('click', () => mongoOpenCollection(db, col.name));
    container.appendChild(row2);
  }
}

async function mongoOpenCollection(db, col) {
  // Marcar activo
  document.querySelectorAll('.mg-col.active').forEach(r => r.classList.remove('active'));
  event?.currentTarget?.classList?.add?.('active');

  const tabId = `mongo::${db}::${col}`;
  const existing = _openTabs.findIndex(t => t.path === tabId);
  if (existing >= 0) { ideActivateTab(existing); return; }

  const data = await fetch(`/api/mongo/docs?db=${encodeURIComponent(db)}&col=${encodeURIComponent(col)}&limit=50`)
    .then(r => r.json()).catch(() => ({ error: 'error' }));

  const content = data.error
    ? JSON.stringify({ error: data.error }, null, 2)
    : JSON.stringify(data.docs, null, 2);

  _openTabs.push({ path: tabId, name: `${db} › ${col}`, ext: 'json', content });
  ideActivateTab(_openTabs.length - 1);
}

// ── IDE ───────────────────────────────────────────────────────────
let _ideRoot = null;       // ruta raíz cargada
let _openTabs = [];        // [{path, name, ext, content}]
let _activeTab = null;
let _expandedDirs = new Set();

// MCP name → activity bar button id
const _mcpBtnMap = { mongodb: 'btn-mongo' };

function applyMcpStatus(status) {
  for (const [mcp, btnId] of Object.entries(_mcpBtnMap)) {
    const btn = document.getElementById(btnId);
    if (!btn) continue;
    const enabled = status[mcp] !== false && status[mcp] !== undefined ? status[mcp] : false;
    btn.classList.toggle('mcp-disabled', !enabled);
    if (!enabled) {
      btn.onclick = null;  // bloquear click
      btn.title = `MongoDB (MCP deshabilitado)`;
    } else {
      btn.onclick = () => ideSwitchPanel('mongo');
      btn.title = 'MongoDB';
    }
  }
}

async function ideInit() {
  if (_ideRoot) { ideRenderTree(_ideRoot); return; }
  const info = await fetch('/api/info').then(r => r.json()).catch(() => ({}));
  _ideRoot = info.cwd || '/';
  ideLoadDir(_ideRoot, document.getElementById('file-tree'), 0, true);
}

async function ideLoadDir(path, container, depth, replace) {
  const data = await fetch(`/api/files?path=${encodeURIComponent(path)}`).then(r=>r.json()).catch(()=>({entries:[]}));
  const entries = data.entries || [];
  if (replace) container.innerHTML = '';

  for (const e of entries) {
    if (e.name.startsWith('.') && depth === 0) continue; // ocultar dotfiles en raíz

    const row = document.createElement('div');
    row.className = 'ft-item';
    row.style.setProperty('--depth', depth);
    row.dataset.path = e.path;
    row.dataset.isdir = e.isDir;

    const arrow = document.createElement('span');
    arrow.className = 'ft-arrow';
    arrow.textContent = e.isDir ? (_expandedDirs.has(e.path) ? '▼' : '▶') : '';

    const icon = document.createElement('span');
    icon.className = 'ft-icon';
    icon.textContent = e.isDir ? '📁' : _fileIcon(e.ext);

    const name = document.createElement('span');
    name.className = 'ft-name';
    name.textContent = e.name;

    row.appendChild(arrow);
    row.appendChild(icon);
    row.appendChild(name);
    container.appendChild(row);

    if (e.isDir) {
      const sub = document.createElement('div');
      sub.id = 'ft-sub-' + btoa(e.path).replace(/[^a-z0-9]/gi, '');
      container.appendChild(sub);
      if (_expandedDirs.has(e.path)) {
        ideLoadDir(e.path, sub, depth + 1, true);
      }
      row.addEventListener('click', () => ideToggleDir(e.path, sub, arrow, depth + 1));
    } else {
      row.addEventListener('click', () => { ideOpenFile(e.path, e.name, e.ext); ideSetActive(row); });
    }
  }
}

function ideToggleDir(path, sub, arrow, childDepth) {
  if (_expandedDirs.has(path)) {
    _expandedDirs.delete(path);
    sub.innerHTML = '';
    arrow.textContent = '▶';
  } else {
    _expandedDirs.add(path);
    arrow.textContent = '▼';
    ideLoadDir(path, sub, childDepth, true);
  }
}

function ideSetActive(row) {
  document.querySelectorAll('.ft-item.active').forEach(r => r.classList.remove('active'));
  row.classList.add('active');
}

function _fileIcon(ext) {
  const m = { py:'🐍', js:'📜', ts:'📘', json:'📋', md:'📝', html:'🌐', css:'🎨',
               toml:'⚙️', yaml:'⚙️', yml:'⚙️', sh:'🖥️', txt:'📄', lock:'🔒', env:'🔑' };
  return m[ext] || '📄';
}

async function ideOpenFile(path, name, ext) {
  // Si ya está abierto, activar tab
  const existing = _openTabs.findIndex(t => t.path === path);
  if (existing >= 0) { ideActivateTab(existing); return; }

  const data = await fetch(`/api/file?path=${encodeURIComponent(path)}`).then(r=>r.json()).catch(()=>null);
  if (!data || data.error) return;

  _openTabs.push({ path, name, ext, content: data.content });
  ideActivateTab(_openTabs.length - 1);
}

function ideActivateTab(idx) {
  _activeTab = idx;
  const tab = _openTabs[idx];

  // Render tabs bar
  const tabsEl = document.getElementById('editor-tabs');
  tabsEl.innerHTML = '';
  _openTabs.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'editor-tab' + (i === idx ? ' active' : '');
    el.innerHTML = `<span>${_fileIcon(t.ext)} ${t.name}</span>`
      + `<span class="editor-tab-close" data-idx="${i}">✕</span>`;
    el.addEventListener('click', e => {
      if (e.target.dataset.idx !== undefined) { ideCloseTab(+e.target.dataset.idx); return; }
      ideActivateTab(i);
    });
    tabsEl.appendChild(el);
  });

  // Render editor content
  const empty  = document.getElementById('editor-empty');
  const wrap   = document.getElementById('editor-code-wrap');
  const gutter = document.getElementById('editor-gutter');
  const code   = document.getElementById('editor-code');
  empty.style.display  = 'none';
  wrap.style.display   = 'flex';

  // Syntax highlight (con fallback si hljs no carga)
  const _extAlias = { md:'markdown', ts:'typescript', js:'javascript', py:'python',
                      sh:'bash', yml:'yaml', toml:'ini', lock:'plaintext', env:'bash' };
  try {
    const rawExt = _extAlias[tab.ext] || tab.ext;
    const lang = (typeof hljs !== 'undefined' && hljs.getLanguage(rawExt)) ? rawExt : 'plaintext';
    const highlighted = (typeof hljs !== 'undefined')
      ? hljs.highlight(tab.content, { language: lang, ignoreIllegals: true }).value
      : tab.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    code.innerHTML = highlighted;
  } catch(e) {
    code.textContent = tab.content;
  }

  // Line numbers
  const lines = tab.content.split('\n');
  gutter.innerHTML = lines.map((_, i) => `<div>${i + 1}</div>`).join('');
}

function ideCloseTab(idx) {
  _openTabs.splice(idx, 1);
  if (_openTabs.length === 0) {
    _activeTab = null;
    document.getElementById('editor-tabs').innerHTML = '';
    document.getElementById('editor-empty').style.display = 'flex';
    document.getElementById('editor-code-wrap').style.display = 'none';
  } else {
    ideActivateTab(Math.min(idx, _openTabs.length - 1));
  }
}

// ── Resume ───────────────────────────────────────────────────────
const resumeOverlay = document.getElementById('resume-overlay');
const resumeList    = document.getElementById('resume-list');
document.getElementById('resume-close').addEventListener('click', () => {
  resumeOverlay.classList.remove('visible');
});
resumeOverlay.addEventListener('click', e => {
  if (e.target === resumeOverlay) resumeOverlay.classList.remove('visible');
});

// ── Plan popup ────────────────────────────────────────────
function showPlanPopup(text) {
  document.getElementById('plan-modal-body').textContent = text.replace(/^PLAN>>\s*/, '');
  document.getElementById('plan-overlay').classList.add('visible');
}
function closePlanPopup() {
  document.getElementById('plan-overlay').classList.remove('visible');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePlanPopup();
});

async function showResume() {
  resumeList.innerHTML = '';
  const items = await fetch('/api/history').then(r => r.json()).catch(() => []);
  if (!items.length) {
    resumeList.innerHTML = '<div id="resume-empty">No hay conversaciones guardadas para este modo.</div>';
  } else {
    for (const item of items) {
      const el = document.createElement('div');
      el.className = 'resume-item';
      const d = new Date(item.date);
      const dateStr = d.toLocaleString('es', { dateStyle: 'medium', timeStyle: 'short' });
      el.innerHTML = `<div class="resume-title">${item.title}</div>`
        + `<div class="resume-meta">${dateStr} · ${item.turns} pregunta${item.turns !== 1 ? 's' : ''}</div>`;
      el.addEventListener('click', () => loadResume(item.id));
      resumeList.appendChild(el);
    }
  }
  resumeOverlay.classList.add('visible');
}

async function loadResume(id) {
  resumeOverlay.classList.remove('visible');
  const mode = currentMod?.key || '';
  const res = await fetch('/api/history/load', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, mode })
  });
  if (res.ok) {
    addSystemMsg('Conversación cargada. Podés continuar desde donde quedó.');
  } else {
    addSystemMsg('Error al cargar la conversación.');
  }
}

// ── Go ────────────────────────────────────────────────────────────
init();
</script>
